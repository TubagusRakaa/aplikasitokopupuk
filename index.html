<!DOCTYPE html>
<html>
<head>
    <title>Aplikasi Toko Pupuk</title>
</head>
<body>

<iframe 
    src="https://script.google.com/macros/s/AKfycby-OBCIed9gktEsdEvcCwqe9ETO9nUO7o6jcFflNID9l7wOrcjzLCs51clLuvcizovdWQ/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
</iframe>

<script>
window.onload = function() {
    document.querySelector('iframe').requestFullscreen().catch((err) => {
        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
    });
};
</script>

</body>
</html>
